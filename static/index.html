<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroClaw AI Agent Dashboard</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f5f7fa;
            --text: #333;
            --white: #ffffff;
            --border: #ddd;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: var(--white);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 2rem auto;
            width: 100%;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        #login-view {
            padding: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .checkbox-group input {
            width: auto;
        }
        #chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            line-height: 1.4;
        }
        .message.user {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 0.2rem;
        }
        .message.agent {
            align-self: flex-start;
            background-color: #e9ecef;
            border-bottom-left-radius: 0.2rem;
        }
        .input-area {
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
        }
        button {
            padding: 0.8rem 1.5rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            opacity: 0.9;
        }
        #user-info {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>ZeroClaw Agents</h1>
        <div id="user-display">
            <span id="user-info"></span>
            <button id="logout-btn" style="display:none; margin-left:1rem; padding: 0.4rem 0.8rem;">Logout</button>
        </div>
    </header>

    <div class="container">
        <div id="login-view">
            <h2>Sign Up / Sign In</h2>
            <p>Configure your agent and enter a User ID to start.</p>
            
            <div class="form-group">
                <label for="user-id-input">User ID</label>
                <input type="text" id="user-id-input" placeholder="e.g., alice">
            </div>

            <div class="form-group">
                <label for="provider-select">AI Provider</label>
                <select id="provider-select">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="gemini">Google Gemini</option>
                    <option value="lmstudio">LMStudio (Local)</option>
                    <option value="synthetic">Synthetic (Mock)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="model-input">Model Name</label>
                <input type="text" id="model-input" value="gpt-4o" placeholder="e.g., gpt-4o, claude-3-5-sonnet">
            </div>

            <div class="form-group" id="base-url-group" style="display: none;">
                <label for="base-url-input">Base URL</label>
                <input type="text" id="base-url-input" value="http://localhost:1234/v1" placeholder="e.g., http://localhost:1234/v1">
            </div>

            <div class="form-group">
                <label>Available Tools</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="tool-weather" checked>
                    <label for="tool-weather">Weather Tool</label>
                </div>
            </div>

            <div style="margin-top: 2rem;">
                <button id="login-btn">Start Session</button>
            </div>
        </div>

        <div id="chat-view">
            <div class="messages" id="messages-container">
                <div class="message agent">Hello! I am your AI agent. How can I help you today?</div>
            </div>
            <form class="input-area" id="chat-form">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script>
        const loginView = document.getElementById('login-view');
        const chatView = document.getElementById('chat-view');
        const userIdInput = document.getElementById('user-id-input');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const messagesContainer = document.getElementById('messages-container');
        
        const providerSelect = document.getElementById('provider-select');
        const modelInput = document.getElementById('model-input');
        const toolWeather = document.getElementById('tool-weather');
        const baseUrlInput = document.getElementById('base-url-input');
        const baseUrlGroup = document.getElementById('base-url-group');

        providerSelect.addEventListener('change', () => {
            if (providerSelect.value === 'lmstudio') {
                baseUrlGroup.style.display = 'block';
                if (!modelInput.value || modelInput.value === 'gpt-4o') {
                    modelInput.value = 'local-model';
                }
            } else {
                baseUrlGroup.style.display = 'none';
            }
        });

        let currentUserId = null;

        loginBtn.addEventListener('click', async () => {
            const userId = userIdInput.value.trim();
            if (!userId) return;

            const config = {
                provider: providerSelect.value === 'lmstudio' ? 'openai' : providerSelect.value,
                model: modelInput.value.trim(),
                tools: [],
                base_url: providerSelect.value === 'lmstudio' ? baseUrlInput.value.trim() : null
            };
            if (toolWeather.checked) config.tools.push('weather');

            try {
                const response = await fetch(`/signup/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                if (response.ok || response.status === 409) {
                    // 409 means user already exists, which is fine for "logging in"
                    startSession(userId);
                } else {
                    const error = await response.text();
                    alert(`Signup failed: ${error}`);
                }
            } catch (err) {
                alert(`Connection error: ${err.message}`);
            }
        });

        logoutBtn.addEventListener('click', () => {
            currentUserId = null;
            userInfo.textContent = '';
            logoutBtn.style.display = 'none';
            loginView.style.display = 'block';
            chatView.style.display = 'none';
            messagesContainer.innerHTML = '<div class="message agent">Hello! I am your AI agent. How can I help you today?</div>';
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message || !currentUserId) return;

            addMessage(message, 'user');
            messageInput.value = '';

            try {
                const response = await fetch(`/agent/${currentUserId}/turn`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (response.ok) {
                    const reply = await response.text();
                    addMessage(reply, 'agent');
                } else {
                    const error = await response.text();
                    addMessage(`Error: ${error}`, 'agent');
                }
            } catch (err) {
                addMessage(`Connection error: ${err.message}`, 'agent');
            }
        });

        async function startSession(userId) {
            currentUserId = userId;
            userInfo.textContent = `User: ${userId}`;
            logoutBtn.style.display = 'inline-block';
            loginView.style.display = 'none';
            chatView.style.display = 'flex';

            // Load history
            try {
                const response = await fetch(`/agent/${userId}/history`);
                if (response.ok) {
                    const history = await response.json();
                    if (history && history.length > 0) {
                        messagesContainer.innerHTML = '';
                        history.forEach(msg => {
                            // Basic heuristic to distinguish user vs agent messages in history
                            // Since the actor returns strings from agent.history(), 
                            // we'll display them. In a real app, history would include roles.
                            addMessage(msg, 'agent'); 
                        });
                    }
                }
            } catch (err) {
                console.error('Failed to load history:', err);
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
